# Cache module messages (English)

# Local cache messages
cache.error.computation.failed=Cache value computation failed
cache.error.computation.key=Failed to compute value for key {0} in cache {1}

# Redis cache messages
cache.error.redis.get.failed=Failed to get value from Redis for key {0} in cache {1}
cache.error.redis.put.failed=Failed to put value in Redis for key {0} in cache {1}
cache.error.redis.serialize.failed=Failed to serialize value for key {0} in cache {1}
cache.error.redis.deserialize.failed=Failed to deserialize value for key {0}
cache.error.redis.clear.all.failed=Failed to clear all Redis caches
cache.error.redis.statistics.failed=Failed to get Redis statistics for cache {0}
cache.error.redis.connection.failed=Redis connection failed
cache.error.redis.connection.factory.null=RedisConnectionFactory is null
cache.error.redis.statistics.factory.null=Cannot get statistics: RedisConnectionFactory is null

# Initialization messages
cache.info.local.initialized=Local cache strategy initialized with Caffeine
cache.info.local.shutdown=Local cache strategy shutdown complete
cache.info.redis.initialized=Redis cache strategy initialized successfully
cache.info.redis.shutdown=Redis cache strategy shutdown complete
cache.info.service.initialized=Cache service initialized with strategy: {0}

# Warning messages
cache.warn.redis.clear.all=Clearing all Redis caches - this affects all applications using this Redis instance!
cache.warn.ttl.mismatch=Cache {0} already exists with different TTL. Using existing cache TTL. Requested TTL: {1}
